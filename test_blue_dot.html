<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mappedin Blue Dot - Click to Move (HTML Only)</title>

  <style>
    html, body { width: 100%; height: 100%; margin: 0; }
    #mappedin-map { width: 100%; height: 100%; position: relative; }

    /* Small overlay for instructions */
    #hint {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.95);
      padding: 10px 12px;
      border-radius: 10px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 13px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      max-width: 320px;
      line-height: 1.35;
    }

    #hint code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>

<body>
  <div id="mappedin-map">
    <div id="hint">
      <b>Blue Dot demo</b><br/>
      Click anywhere on the map to move the Blue Dot.<br/>
      (This uses <code>blueDot.update(...)</code> on click.)
    </div>
  </div>

  <script type="module">
    // ✅ Your known-working Mappedin JS import (direct file from jsDelivr)
    import { getMapData, show3dMap } from "https://cdn.jsdelivr.net/npm/@mappedin/mappedin-js@6.0/lib/esm/index.min.js";

    // ✅ Blue Dot import via esm.run (browser ESM CDN)
    // esm.run is designed for loading npm packages as ESM in the browser without build tooling. [2](https://docs.mappedin.com/web/v6/latest/index.html)[3](https://cdn.jsdelivr.net/npm/download/)
    //
    // IMPORTANT: @mappedin/blue-dot should match @mappedin/mappedin-js version. [1](https://codesandbox.io/examples/package/@mappedin/blue-dot)
    // If you get a 404 here, swap to an available version shown on jsDelivr’s @mappedin/blue-dot page.
    import { BlueDot } from "https://esm.run/@mappedin/blue-dot@6.0.1-beta.54";

    // Demo map credentials (Mappedin demo keys)
    const options = {
      key: "mik_yeBk0Vf0nNJtpesfu560e07e5",
      secret: "mis_2g9ST8ZcSFb5R9fPnsvYhrX3RyRwPtDGbMGweCYKEq385431022",
      mapId: "64ef49e662fd90fe020bee61"
    };

    async function init() {
      const mapData = await getMapData(options);
      const mapView = await show3dMap(document.getElementById("mappedin-map"), mapData);

      // Create and enable Blue Dot (manual mode; we will update it ourselves).
      // Mappedin’s docs show enabling Blue Dot via new BlueDot(mapView).enable(). [1](https://codesandbox.io/examples/package/@mappedin/blue-dot)
      const blueDot = new BlueDot(mapView);
      blueDot.enable({ watchDevicePosition: false, color: "dodgerblue" });

      // Optional: place the dot at the map’s initial center-ish by clicking once,
      // or just leave it until first click.

      mapView.on("click", (event) => {
        // Mappedin click events provide a coordinate (lat/lng).
        const c = event.coordinate;
        if (!c) return;

        // Update Blue Dot position to clicked coordinate:
        blueDot.update({
          latitude: c.latitude,
          longitude: c.longitude,
          accuracy: 5,
          heading: 0,
          floorOrFloorId: mapView.currentFloor?.id
        });

        // Optional: follow it with the camera
        mapView.Camera.animateTo(
          { center: c, zoomLevel: 20 },
          { duration: 700, easing: "ease-in-out" }
        );
      });

      console.log("Map loaded. Click map to move Blue Dot.");
    }

    init().catch((err) => {
      console.error("Init failed:", err);
      alert("Init failed. Check console for details.");
    });
  </script>
</body>
</html>
