<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mappedin + BlueDot (HTML only)</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; }
    #mappedin-map { width: 100%; height: 100%; position: relative; }
  </style>
</head>
<body>
  <div id="mappedin-map"></div>

  <script type="module">
    import { getMapData, show3dMap } from "https://cdn.jsdelivr.net/npm/@mappedin/mappedin-js@6.0/lib/esm/index.min.js";

    // IMPORTANT: choose a BlueDot version that actually exists and matches your mappedin-js version. [2](https://codesandbox.io/examples/package/@mappedin/blue-dot)[3](https://www.npmjs.com/package/esm)
    import { BlueDot } from "https://esm.run/@mappedin/blue-dot@6.0.1-beta.54";

    const options = {
      key: "mik_yeBk0Vf0nNJtpesfu560e07e5",
      secret: "mis_2g9ST8ZcSFb5R9fPnsvYhrX3RyRwPtDGbMGweCYKEq385431022",
      mapId: "64ef49e662fd90fe020bee61"
    };

    async function init() {
      const mapData = await getMapData(options);
      const mapView = await show3dMap(document.getElementById("mappedin-map"), mapData);

      const blueDot = new BlueDot(mapView);
      blueDot.enable({ watchDevicePosition: true }); // prompts for location permission [2](https://codesandbox.io/examples/package/@mappedin/blue-dot)

      console.log("Map loaded; BlueDot enabled.");
    }

    init().catch(console.error);
  </script>
</body>
</html>
